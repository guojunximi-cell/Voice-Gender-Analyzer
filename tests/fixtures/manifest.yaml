# tests/fixtures/manifest.yaml
#
# **READ FIRST: tests/fixtures/KNOWN_LIMITATIONS.md**
# Synthetic samples (sox pitch shift) are usable for trend observation only.
# They MUST NOT be used for architectural decisions, threshold calibration,
# or Engine C signal design — sox pitch shifts F0 and formants together,
# so synthetic samples do not represent F0/formant decoupling that defines
# real cis_male_high_f0 and trans voices.
#
# 每个条目对应一个音频文件。test_confidence_c1.py 读取此文件进行分类和分析。
#
# 字段说明：
#   filename            相对于 tests/fixtures/ 的路径
#   category            cis_female | cis_male_standard | cis_male_high_f0 |
#                       trans_fem_early | trans_fem_mid | trans_fem_late |
#                       trans_masc | neutral
#   ground_truth_label  "female" | "male" | "neutral"
#                       neutral = Engine A 预期不确定，不计入分类准确率
#   estimated_f0_median_hz  pyin[60-250] 实测中位数，0 表示未知
#   source              数据来源
#   notes               备注（synthetic_pitch_shift 样本须标注）
#
# 数据来源说明：
#   CMU ARCTIC  — Apache 2.0 / CMU 条款，学术/商业均可
#     BDL = male, American English, F0 ~121-135 Hz
#     JMK = male, Canadian English, F0 ~103-113 Hz
#     RMS = male, American English, F0 ~80-100 Hz
#     AWB = male, Scottish English, F0 ~124-139 Hz
#     SLT = female, American English, F0 ~174-197 Hz
#     CLB = female, American English, F0 ~180-185 Hz
#   VCTK — CC-BY 4.0, CSTR Edinburgh
#     14 speakers (4 M + 10 F), 3 sentences each, mic1 omni-directional
#     Males p302/p304/p334/p360 all F0 88-115 Hz (cis_male_standard only)
#     Note: target high-F0 males p254/p274/p286 NOT YET acquired — see KNOWN_LIMITATIONS.md
#   internal/test_* — 内部测试录音，来源不明，仅用于模型行为观察

